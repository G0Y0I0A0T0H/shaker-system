<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.gstatic.com https://*.firebaseio.com https://*.googleapis.com 'unsafe-inline' 'unsafe-eval';
  script-src-elem 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.gstatic.com https://*.firebaseio.com https://*.googleapis.com 'unsafe-inline';
  style-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://fonts.googleapis.com 'unsafe-inline';
  font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com data:;
  img-src 'self' https: data: blob:;
  connect-src 'self' https://*.firebaseio.com wss://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://firebaseinstallations.googleapis.com https://api.cloudinary.com https://www.gstatic.com;
  frame-src 'none'; object-src 'none'; base-uri 'self';
">
<title>SHAKER - لوحة المشرف</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script src="js/chat.js"></script>
<script src="js/call.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: { extend: { fontFamily: { sans: ['Tajawal','sans-serif'] }, colors: { brand: { 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' } } } }
}
</script>
<style>
body { font-family: 'Tajawal', sans-serif; visibility: hidden; }
#toast-container { position:fixed; bottom:1rem; left:1rem; z-index:9999; display:flex; flex-direction:column; gap:.5rem; }
@keyframes slideInLeft { from { transform:translateX(-100%); opacity:0 } to { transform:translateX(0); opacity:1 } }
</style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen">
<div id="toast-container"></div>

<!-- TOP BAR -->
<header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 sticky top-0 z-30">
<div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-indigo-700 flex items-center justify-center text-white font-bold">S</div>
<div>
<h1 class="text-xl font-bold text-brand-600">SHAKER</h1>
<span class="text-xs text-gray-500" id="mod-user-info">لوحة المشرف</span>
</div>
</div>
<div class="flex items-center gap-3">
<!-- Nav tabs -->
<button onclick="modNav('orders')" id="tab-orders" class="px-4 py-2 rounded-lg text-sm font-semibold bg-brand-600 text-white"><i class="fas fa-shopping-cart ml-1"></i> الطلبات</button>
<button onclick="modNav('chat')" id="tab-chat" class="px-4 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700"><i class="fas fa-comments ml-1"></i> المحادثة</button>
<div class="w-px h-8 bg-gray-200 dark:bg-gray-700"></div>
<button onclick="doModLogout()" class="px-3 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm transition"><i class="fas fa-sign-out-alt ml-1"></i> خروج</button>
</div>
</div>
</header>

<!-- ORDERS SECTION -->
<main id="section-orders" class="max-w-7xl mx-auto p-4 space-y-4">
<div class="flex justify-between items-center">
<h2 class="text-xl font-bold"><i class="fas fa-list text-brand-600 ml-2"></i> طلباتي</h2>
<span class="text-sm text-gray-500" id="orders-count"></span>
</div>
<div id="mod-orders-list" class="space-y-3">
<div class="text-center text-gray-400 py-8">جارٍ التحميل...</div>
</div>
</main>

<!-- CHAT SECTION -->
<main id="section-chat" class="hidden max-w-4xl mx-auto p-4" style="height:calc(100vh - 5rem)">
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm flex flex-col h-full overflow-hidden">
<div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-gradient-to-br from-amber-500 to-amber-700 flex items-center justify-center text-white font-bold text-xs">A</div>
<div>
<div class="font-bold text-sm">المدير</div>
<div class="text-xs text-green-500">محادثة مع الإدارة</div>
</div>
</div>
<div class="flex gap-2">
<button onclick="ShakerCall.startCall('ADMIN_UID', false)" id="mod-call-voice" class="w-9 h-9 rounded-full bg-green-500 hover:bg-green-600 text-white flex items-center justify-center transition" title="مكالمة صوتية"><i class="fas fa-phone-alt text-sm"></i></button>
<button onclick="ShakerCall.startCall('ADMIN_UID', true)" id="mod-call-video" class="w-9 h-9 rounded-full bg-blue-500 hover:bg-blue-600 text-white flex items-center justify-center transition" title="مكالمة فيديو"><i class="fas fa-video text-sm"></i></button>
</div>
</div>
<div id="mod-chat-messages" class="flex-1 overflow-y-auto p-4 space-y-2" style="background:linear-gradient(135deg,#f0f4ff 0%,#e8ecf4 100%)"></div>
<div class="p-3 border-t border-gray-200 dark:border-gray-700 flex gap-2">
<input type="text" id="mod-chat-input" placeholder="اكتب رسالة..." class="flex-1 border rounded-full px-4 py-2 text-sm dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 transition" onkeydown="if(event.key==='Enter') ShakerChat.send('mod-chat-input')">
<button onclick="ShakerChat.send('mod-chat-input')" class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-indigo-700 text-white flex items-center justify-center hover:shadow-lg transition"><i class="fas fa-paper-plane text-sm"></i></button>
</div>
</div>
</main>

<script>
let CURRENT_MOD = null;

// ── Navigation ─────────────────────────────────
function modNav(section) {
    document.getElementById('section-orders').classList.toggle('hidden', section !== 'orders');
    document.getElementById('section-chat').classList.toggle('hidden', section !== 'chat');
    document.getElementById('tab-orders').className = section === 'orders'
        ? 'px-4 py-2 rounded-lg text-sm font-semibold bg-brand-600 text-white'
        : 'px-4 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700';
    document.getElementById('tab-chat').className = section === 'chat'
        ? 'px-4 py-2 rounded-lg text-sm font-semibold bg-brand-600 text-white'
        : 'px-4 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700';
}

// ── Logout ──────────────────────────────────────
async function doModLogout() {
    try { await FB.logout(); } catch(_) {}
    window.location.replace('Moderator_login.html');
}

// ── Render orders ───────────────────────────────
function renderOrders(orders) {
    const container = document.getElementById('mod-orders-list');
    const countEl   = document.getElementById('orders-count');
    if (!container) return;
    const myOrders = orders.filter(o => o.moderatorUid === CURRENT_MOD?.uid);
    if (countEl) countEl.textContent = myOrders.length + ' طلب';

    if (myOrders.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-400 py-12"><i class="fas fa-inbox text-4xl mb-3 opacity-30"></i><p>لا توجد طلبات بعد</p></div>';
        return;
    }

    const statusColors = {
        'Pending':   'bg-yellow-100 text-yellow-700',
        'Confirmed': 'bg-blue-100 text-blue-700',
        'Shipped':   'bg-purple-100 text-purple-700',
        'Delivered': 'bg-green-100 text-green-700',
        'Cancelled': 'bg-red-100 text-red-700',
        'Returned':  'bg-gray-100 text-gray-700'
    };
    const statusAr = { 'Pending':'قيد الانتظار', 'Confirmed':'مؤكد', 'Shipped':'تم الشحن', 'Delivered':'تم التسليم', 'Cancelled':'ملغي', 'Returned':'مرتجع' };

    container.innerHTML = myOrders.sort((a,b) => (b.date||0) - (a.date||0)).map(o => {
        const sc = statusColors[o.status] || 'bg-gray-100 text-gray-700';
        return `<div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <span class="font-bold text-lg">${Sanitize.html(o.customer || '')}</span>
                    <span class="text-sm text-gray-400 mr-2">#${o.id ? o.id.slice(-6) : ''}</span>
                </div>
                <span class="px-3 py-1 rounded-full text-xs font-bold ${sc}">${statusAr[o.status] || o.status}</span>
            </div>
            <div class="flex gap-4 text-sm text-gray-500">
                <span><i class="fas fa-phone ml-1"></i>${Sanitize.html(o.phone || '')}</span>
                <span><i class="fas fa-calendar ml-1"></i>${o.date ? new Date(o.date).toLocaleDateString('ar-EG') : '-'}</span>
                <span class="font-bold text-brand-600">${new Intl.NumberFormat('ar-EG',{style:'currency',currency:'EGP'}).format(o.total||0)}</span>
            </div>
        </div>`;
    }).join('');
}

// ── Init ────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
    if (typeof FB !== 'undefined' && FB.init) { try { FB.init(); } catch(_) {} }

    const { user, userData } = await Auth.guardPage('moderator', 'Moderator_login.html');
    CURRENT_MOD = userData;

    const infoEl = document.getElementById('mod-user-info');
    if (infoEl) infoEl.textContent = '👤 ' + (userData.displayName || userData.username || 'مشرف');

    // Init chat
    ShakerChat.init('moderator', user.uid);
    ShakerChat.openOwnChat(user.uid, 'mod-chat-messages');

    // Init call
    ShakerCall.init('moderator', user.uid);

    // Find admin UID for call buttons
    try {
        const db = FB.getDb();
        if (db) {
            const snap = await db.ref('shaker/users').orderByChild('role').equalTo('admin').once('value');
            if (snap.exists()) {
                const admins = Object.entries(snap.val());
                if (admins.length > 0) {
                    const adminUid = admins[0][0];
                    const voiceBtn = document.getElementById('mod-call-voice');
                    const videoBtn = document.getElementById('mod-call-video');
                    if (voiceBtn) voiceBtn.setAttribute('onclick', `ShakerCall.startCall('${adminUid}', false)`);
                    if (videoBtn) videoBtn.setAttribute('onclick', `ShakerCall.startCall('${adminUid}', true)`);
                }
            }
        }
    } catch (_) {}

    // Load orders
    if (FB.isOk()) {
        await Store.syncAll().catch(() => {});
        const orders = Store.get('orders');
        renderOrders(orders);

        // Realtime orders updates
        FB.listen('orders', (data) => {
            const arr = FB.toArray(data);
            renderOrders(arr);
        });
    }
});
</script>
</body>
</html>
