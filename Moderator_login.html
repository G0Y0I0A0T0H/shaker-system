<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHAKER - دخول المشرف</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;}
body{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;}
.wrap{display:flex;width:100%;min-height:100vh;}
.left{flex:1;background:linear-gradient(135deg,#0d0d1a,#0a1628);display:flex;justify-content:center;align-items:center;position:relative;overflow:hidden;}
.left::before{content:"";position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,.2) 0%,transparent 70%);border-radius:50%;}
.logo-box{position:relative;z-index:2;text-align:center;}
.logo-img{width:240px;filter:drop-shadow(0 0 20px rgba(99,102,241,.5));}
.right{flex:1;background:#0f0f1a;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem;}
.card{background:rgba(25,25,40,.95);backdrop-filter:blur(10px);border-radius:20px;padding:2.5rem;width:100%;max-width:420px;border:1px solid rgba(99,102,241,.3);}
.t1{font-size:2.2rem;font-weight:800;color:#818cf8;text-align:center;margin-bottom:.3rem;}
.badge{display:flex;align-items:center;justify-content:center;gap:.5rem;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);border-radius:30px;padding:.4rem 1.2rem;margin:.8rem auto 1.5rem;width:fit-content;color:#a5b4fc;font-size:.9rem;font-weight:600;}
.f{margin-bottom:1.4rem;}
.f label{display:block;margin-bottom:.5rem;color:#818cf8;font-weight:600;font-size:.95rem;}
.iw{position:relative;}
.f input{width:100%;padding:.85rem 1.2rem;background:rgba(30,30,50,.9);border:1px solid rgba(99,102,241,.3);border-radius:12px;color:#fff;font-size:1rem;font-family:'Tajawal',sans-serif;transition:border-color .3s;}
.f input:focus{outline:none;border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.15);}
.eye{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;cursor:pointer;font-size:.9rem;}
.eye:hover{color:#818cf8;}
.btn{width:100%;padding:1rem;background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;border-radius:12px;color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .3s;}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,.5);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#fca5a5;border-radius:10px;padding:.75rem 1rem;font-size:.9rem;text-align:center;margin-top:1rem;display:none;}
.fb-st{text-align:center;margin-top:.6rem;font-size:.8rem;color:#555;}
.fb-st.ok{color:#4ade80;}
.bl{text-align:center;margin-top:1.5rem;}
.bl a{color:#4b5563;font-size:.85rem;text-decoration:none;}
.bl a:hover{color:#818cf8;}
#toast-container{position:fixed;bottom:1rem;left:1rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;}
@media(max-width:900px){.wrap{flex-direction:column;}.left{min-height:30vh;}.logo-img{width:160px;}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.shake{animation:shake .35s ease;}
@keyframes slideInLeft{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="wrap">
  <div class="left">
    <div class="logo-box">
      <img src="assets/images/logo.png" alt="SHAKER" class="logo-img" onerror="this.style.display='none'">
      <h1 style="color:#818cf8;font-size:3.5rem;font-weight:900;margin-top:.5rem;text-shadow:0 0 25px rgba(99,102,241,.8);">SHAKER</h1>
      <p style="color:#6366f1;font-size:.9rem;letter-spacing:2px;margin-top:.3rem;">MODERATOR PORTAL</p>
    </div>
  </div>
  <div class="right">
    <div class="card">
      <h1 class="t1">تسجيل الدخول</h1>
      <div class="badge"><i class="fas fa-user-shield"></i><span>بوابة المشرفين</span></div>
      <div class="f">
        <label>اسم المستخدم</label>
        <div class="iw">
          <input type="text" id="iu" placeholder="اسم المستخدم" autocomplete="username"
                 onkeydown="if(event.key==='Enter')document.getElementById('ip').focus()">
        </div>
      </div>
      <div class="f">
        <label>كلمة المرور</label>
        <div class="iw">
          <input type="password" id="ip" placeholder="كلمة المرور" autocomplete="current-password"
                 onkeydown="if(event.key==='Enter')doLogin()">
          <button class="eye" type="button" onclick="toggleEye()" tabindex="-1">
            <i class="fas fa-eye" id="eye-ic"></i>
          </button>
        </div>
      </div>
      <button class="btn" id="lb" onclick="doLogin()">
        <i class="fas fa-sign-in-alt"></i><span id="lbt">تسجيل الدخول</span>
      </button>
      <div class="err" id="eb"></div>
      <div class="fb-st" id="fb-st">جارٍ الاتصال...</div>
      <div class="bl"><a href="login.html"><i class="fas fa-arrow-right"></i> تسجيل دخول المدير</a></div>
    </div>
  </div>
</div>
<script>
// ══════════════════════════════════════════════════════════
// Moderator Login — Firebase Auth
// Flow: username → email (username@shaker.mod) → Firebase Auth
// Auth.loginModerator handles everything via js/auth.js
// ══════════════════════════════════════════════════════════

FB.init();
const _auth = FB.getAuth(), _db = FB.getDb();

// Show connection status
const stEl = document.getElementById('fb-st');
if (FB.isOk()) { stEl.textContent = '🔥 متصل بـ Firebase'; stEl.className = 'fb-st ok'; }
else { stEl.textContent = '⚠️ تعذر الاتصال'; stEl.className = 'fb-st'; }

// Auto-redirect if already logged in as moderator
if (_auth) {
    _auth.onAuthStateChanged(async user => {
        if (!user) return;
        try {
            const snap = await _db.ref('shaker/users/' + user.uid).once('value');
            if (!snap.exists()) { await _auth.signOut(); return; }
            const d = snap.val();
            if (d.role === 'moderator' && d.active !== false) {
                // Already authenticated moderator — refresh session and redirect
                sessionStorage.setItem('shaker_mod_session', JSON.stringify({
                    uid: user.uid,
                    username: d.username || d.displayName || user.email?.replace('@shaker.mod','') || '',
                    displayName: d.displayName || d.username || '',
                    role: 'moderator',
                    loginTime: Date.now()
                }));
                window.location.href = 'Moderator.html';
            } else if (d.role === 'admin') {
                window.location.href = 'index.html';
            } else {
                await _auth.signOut();
            }
        } catch(_) {}
    });
}

function showErr(msg) {
    const el = document.getElementById('eb');
    el.textContent = msg;
    el.style.display = 'block';
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
}

function toggleEye() {
    const i = document.getElementById('ip'), ic = document.getElementById('eye-ic');
    if (i.type === 'password') { i.type = 'text'; ic.className = 'fas fa-eye-slash'; }
    else { i.type = 'password'; ic.className = 'fas fa-eye'; }
}

async function doLogin() {
    if (!Throttle.check('mod_login')) return;
    document.getElementById('eb').style.display = 'none';
    const username = document.getElementById('iu').value.trim().toLowerCase();
    const pass     = document.getElementById('ip').value;
    const btn = document.getElementById('lb'), bt = document.getElementById('lbt');
    if (!username || !pass) { showErr('يرجى إدخال اسم المستخدم وكلمة المرور'); return; }
    if (!FB.isOk()) { showErr('Firebase غير متصل — تحقق من الإنترنت'); return; }
    btn.disabled = true; bt.textContent = 'جارٍ التحقق...';
    try {
        // Firebase Auth: username@shaker.mod + password
        const user = await Auth.loginModerator(username, pass);
        // Read profile from DB
        const snap = await _db.ref('shaker/users/' + user.uid).once('value');
        const d = snap.exists() ? snap.val() : {};
        // Save session
        sessionStorage.setItem('shaker_mod_session', JSON.stringify({
            uid: user.uid,
            username: d.username || username,
            displayName: d.displayName || d.username || username,
            role: 'moderator',
            loginTime: Date.now()
        }));
        Throttle.clear('mod_login');
        window.location.href = 'Moderator.html';
    } catch(e) {
        Throttle.record('mod_login');
        showErr(e.message);
        btn.disabled = false; bt.textContent = 'تسجيل الدخول';
    }
}
</script>
</body>
</html>
